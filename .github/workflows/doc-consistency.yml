name: Doc Consistency

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  self-test:
    name: Checker Self-Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run doc-checker self-test suite
        run: bash tests/test-doc-checker.sh

  check-docs:
    name: Public Documentation Consistency
    runs-on: ubuntu-latest
    needs: [self-test]
    steps:
      - name: Checkout org meta
        uses: actions/checkout@v4
        with:
          path: .github

      - name: Checkout all public repos (fail-fast on missing)
        run: |
          set -e
          FAILED=0
          for repo in qontos qontos-sim qontos-examples qontos-benchmarks qontos-research; do
            echo "Cloning ${repo}..."
            if ! git clone --depth=1 "https://github.com/qontos/${repo}.git" "${repo}" 2>&1; then
              echo "::error::Failed to clone qontos/${repo}"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} repo(s) failed to clone"
            exit 1
          fi
          echo "All 5 public repos cloned"

      - name: Run cross-repo doc-consistency checker
        run: bash .github/scripts/check-doc-consistency.sh .

name: Bug Report
description: Report a bug in a QONTOS package
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.
  - type: input
    id: package
    attributes:
      label: Package
      description: Which QONTOS package is affected?
      placeholder: "e.g., qontos, qontos-sim, qontos-bench"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "e.g., 0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the behavior.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS:
        - Python version:
        - Qiskit version (if applicable):
      render: shell
